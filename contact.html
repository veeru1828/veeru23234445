<!DOCTYPE html>
<html>
<head>
<title>Contact Us - SVS College</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(to right,#eef2f3,#dbe9f4);
}

/* Header */
.header{
    background:linear-gradient(90deg,#002147,#004080);
    color:white;
    padding:30px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:36px;
}

/* Main Container */
.container{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

/* Contact Info Box */
.contact-info{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    margin-bottom:40px;
    text-align:center;
}

.contact-info p{
    font-size:18px;
    margin:10px 0;
}

/* Contact Form */
.contact-form{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.contact-form h2{
    text-align:center;
    margin-bottom:20px;
    color:#002147;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    background:#002147;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    width:100%;
    transition:0.3s;
}

button:hover{
    background:#004080;
}

/* Office Hours */
.office-hours{
    margin-top:40px;
    background:#ffffff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:center;
}

.office-hours h2{
    color:#002147;
}

a{
    display:inline-block;
    margin-top:30px;
    padding:12px 30px;
    background:#002147;
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    background:#004080;
}

/* Footer */
footer{
    margin-top:50px;
    background:#002147;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Contact SVS Bellubi College</h1>
</div>

<div class="container">

    <!-- Contact Information -->
    <div class="contact-info">
        <p><strong>Email:</strong> info@svscollege.com</p>
        <p><strong>Phone:</strong> +91 9876543210</p>
        <p><strong>Address:</strong> Bellubi, India</p>
    </div>

    <!-- Contact Form -->
    <div class="contact-form">
        <h2>Send Us a Message</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="tel" placeholder="Your Phone Number">
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- Office Hours -->
    <div class="office-hours">
        <h2>Office Hours</h2>
        <p>Monday - Friday: 9:00 AM - 5:00 PM</p>
        <p>Saturday: 9:00 AM - 1:00 PM</p>
        <p>Sunday: Closed</p>
    </div>

    <div style="text-align:center;">
        <a href="index.html">Back to Home</a>
    </div>

</div>

<footer>
    © 2026 SVS College | All Rights Reserved
</footer>

</body>
</html>
